name: Update Yesterday Wins

on:
  schedule:
    - cron: "17 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-wins:
    runs-on: ubuntu-latest

    steps:
      - name: Get repo files
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Count yesterday wins
        run: node scripts/update-yesterday-wins.mjs

      - name: Save updated result
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add top-wins-yesterday.json
          git diff --cached --quiet || git commit -m "Update yesterday wins"
          git push
