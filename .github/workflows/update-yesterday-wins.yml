name: Update Points Race

on:
  schedule:
    - cron: "7 0 * * *"
    - cron: "7 10,13,16,19,22 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-points:
    runs-on: ubuntu-latest

    steps:
      - name: Get repo files
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Count points race
        run: node scripts/update-yesterday-wins.mjs

      - name: Save updated result
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add daily-points-race.json
          git diff --cached --quiet || git commit -m "Update points race"
          git push
